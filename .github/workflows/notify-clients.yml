# =============================================================================
# White-Label CMS — Notify Client Instances of New Version
# =============================================================================
# Triggers when cms-version.json changes (after auto-version bump).
# Reads client registry from CLIENT_REGISTRY secret (JSON array).
# Dispatches each client's deploy workflow to merge upstream + redeploy.
#
# SETUP (one-time):
#   1. Go to repo Settings → Secrets → Actions
#   2. Create secret: CLIENT_REGISTRY
#   3. Value: JSON array of client objects (see format below)
#   4. Create one PAT secret per client (name matches "secret" field)
#
# CLIENT_REGISTRY format:
#   [
#     {
#       "name": "My Client",
#       "org": "GavinHolder",
#       "repo": "client-cms",
#       "workflow": "deploy.yml",
#       "secret": "CLIENT1_PAT",
#       "auto_deploy": true
#     }
#   ]
#
# Required Secrets:
#   CLIENT_REGISTRY  — JSON array of client entries
#   <CLIENT_PAT>     — One PAT per client (repo + workflow scope)
# =============================================================================

name: Notify Clients

on:
  push:
    branches: [main]
    paths:
      - "public/cms-version.json"

  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run — log without dispatching"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

jobs:
  notify:
    name: Notify Client Repos
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version
        id: version
        run: |
          VERSION=$(node -e "console.log(require('./public/cms-version.json').version)")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "CMS version: $VERSION"

      - name: Dispatch to clients
        env:
          CLIENT_REGISTRY: ${{ secrets.CLIENT_REGISTRY }}
          VERSION: ${{ steps.version.outputs.version }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          # ─── CLIENT PAT SECRETS ─────────────────────────────
          # Add each client's PAT here. Name must match the
          # "secret" field in the CLIENT_REGISTRY JSON.
          # To add a new client: add entry to CLIENT_REGISTRY
          # secret, create PAT secret, add line below.
          OVB_PAT: ${{ secrets.OVB_PAT }}
          SONIC_PAT: ${{ secrets.SONIC_PAT }}
          # ────────────────────────────────────────────────────
        run: |
          if [ -z "$CLIENT_REGISTRY" ] || [ "$CLIENT_REGISTRY" = "[]" ]; then
            echo "No clients registered (CLIENT_REGISTRY secret empty or not set)"
            exit 0
          fi

          node -e "
            const clients = JSON.parse(process.env.CLIENT_REGISTRY || '[]');
            const version = process.env.VERSION;
            const dryRun = process.env.DRY_RUN === 'true';

            if (!clients.length) { console.log('No clients to notify'); process.exit(0); }

            async function dispatch(client) {
              const { name, org, repo, workflow = 'deploy.yml', secret, auto_deploy } = client;
              const mergeUpstream = auto_deploy !== false ? 'true' : 'false';
              const pat = process.env[secret];

              if (!pat) {
                console.error('[' + (name || repo) + '] Secret ' + secret + ' not set — skipping');
                return { name: name || repo, status: 'skipped', error: 'Missing PAT secret' };
              }

              const url = 'https://api.github.com/repos/' + org + '/' + repo + '/actions/workflows/' + workflow + '/dispatches';
              console.log('[' + (name || repo) + '] → ' + org + '/' + repo + ' (merge=' + mergeUpstream + ')');

              if (dryRun) {
                console.log('  DRY RUN: would dispatch');
                return { name: name || repo, status: 'dry_run' };
              }

              try {
                const res = await fetch(url, {
                  method: 'POST',
                  headers: {
                    'Authorization': 'Bearer ' + pat,
                    'Accept': 'application/vnd.github+json',
                    'X-GitHub-Api-Version': '2022-11-28',
                    'Content-Type': 'application/json',
                  },
                  body: JSON.stringify({ ref: 'main', inputs: { merge_upstream: mergeUpstream } }),
                });

                if (res.status === 204) {
                  console.log('  ✅ Dispatched');
                  return { name: name || repo, status: 'dispatched' };
                } else {
                  const body = await res.text();
                  console.error('  ❌ Failed (' + res.status + '): ' + body);
                  return { name: name || repo, status: 'failed', error: body };
                }
              } catch (err) {
                console.error('  ❌ Error: ' + err.message);
                return { name: name || repo, status: 'error', error: err.message };
              }
            }

            (async () => {
              const results = [];
              for (const client of clients) results.push(await dispatch(client));

              console.log('');
              console.log('=== Notification Summary ===');
              console.log('CMS Version: v' + version);
              console.log('Clients: ' + results.length);
              console.log('Dispatched: ' + results.filter(r => r.status === 'dispatched').length);
              console.log('Skipped: ' + results.filter(r => r.status === 'skipped').length);
              const failures = results.filter(r => r.status === 'failed' || r.status === 'error');
              if (failures.length) {
                failures.forEach(f => console.error('  ' + f.name + ': ' + f.error));
                process.exit(1);
              }
            })();
          "
