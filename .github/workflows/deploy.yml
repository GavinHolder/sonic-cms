# =============================================================================
# Sonic CMS — Build & Deploy
# =============================================================================
# Triggers:
#   - push to main (standard deploy)
#   - workflow_dispatch (manual or triggered by CMS Update system)
#
# When triggered by workflow_dispatch with merge_upstream=true, merges latest
# from upstream white-label-cms before building.
#
# Secrets required:
#   PORTAINER_URL         — e.g. https://portainer.sonic.co.za
#   PORTAINER_PASSWORD    — Portainer admin password
#   PORTAINER_STACK_ID    — Stack ID from Portainer URL (e.g. 6)
#   PORTAINER_ENDPOINT_ID — Endpoint ID from Portainer URL (e.g. 3)
#   UPSTREAM_REPO_URL     — (optional) upstream CMS repo, defaults to white-label-cms
# =============================================================================

name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      merge_upstream:
        description: "Merge latest from upstream white-label-cms before building"
        required: false
        default: "true"
        type: choice
        options: ["true", "false"]

env:
  IMAGE: ghcr.io/gavinholder/sonic-cms

permissions:
  contents: write
  packages: write

jobs:
  # ── Job 0: (Optional) Merge from upstream CMS ─────────────────────────────
  upstream-merge:
    name: Merge Upstream CMS Updates
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.merge_upstream == 'true'
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote and merge
        run: |
          UPSTREAM="${{ secrets.UPSTREAM_REPO_URL }}"
          if [ -z "$UPSTREAM" ]; then
            echo "UPSTREAM_REPO_URL secret not set — using default"
            UPSTREAM="https://github.com/GavinHolder/white-label-cms.git"
          fi

          git config merge.ours.driver true
          git remote add upstream "$UPSTREAM"
          git fetch upstream main

          # Merge upstream. -X ours resolves text conflicts in our favour.
          # modify/delete conflicts need explicit resolution.
          if ! git merge upstream/main --no-edit --allow-unrelated-histories \
            -X ours \
            -m "chore: merge upstream CMS updates"; then
            echo "Merge had conflicts — resolving..."
            git diff --name-only --diff-filter=U | while read -r f; do
              echo "  Resolving: $f (accepting ours / deleting)"
              git rm -f "$f" 2>/dev/null || { git checkout --ours "$f" && git add "$f"; }
            done
            git commit --no-edit -m "chore: merge upstream CMS (conflicts resolved)"
          fi

          # Remove upstream-only workflows — client keeps ONLY deploy.yml
          KEEP="deploy.yml"
          for f in .github/workflows/*.yml .github/workflows/*.yaml .github/workflows/*.template; do
            [ -f "$f" ] || continue
            basename=$(basename "$f")
            if [ "$basename" != "$KEEP" ]; then
              git rm -f "$f" 2>/dev/null && echo "Removed upstream workflow: $f" || true
            fi
          done
          if ! git diff --staged --quiet; then
            git commit -m "chore: remove upstream workflow files from client repo [skip ci]"
          fi

          git push origin main

  # ── Job 1: Build and push Docker image ─────────────────────────────────────
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: [upstream-merge]
    if: always() && (needs.upstream-merge.result == 'success' || needs.upstream-merge.result == 'skipped')
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Job 2: Trigger Portainer stack redeploy ──────────────────────────────────
  deploy:
    name: Deploy via Portainer
    runs-on: ubuntu-latest
    needs: build
    if: always() && needs.build.result == 'success'

    steps:
      - name: Redeploy stack via Portainer API
        run: |
          if [ -z "${{ secrets.PORTAINER_URL }}" ] || [ -z "${{ secrets.PORTAINER_PASSWORD }}" ]; then
            echo "PORTAINER_URL or PORTAINER_PASSWORD secret not set — skipping redeploy"
            exit 0
          fi

          JWT=$(curl -s -X POST "${{ secrets.PORTAINER_URL }}/api/auth" \
            -H "Content-Type: application/json" \
            -d '{"username":"admin","password":"${{ secrets.PORTAINER_PASSWORD }}"}' \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['jwt'])")

          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" -X PUT \
            "${{ secrets.PORTAINER_URL }}/api/stacks/${{ secrets.PORTAINER_STACK_ID }}/git/redeploy?endpointId=${{ secrets.PORTAINER_ENDPOINT_ID }}" \
            -H "Authorization: Bearer $JWT" \
            -H "Content-Type: application/json" \
            -d '{"pullImage":true,"prune":false,"RepositoryReferenceName":"refs/heads/main"}')

          echo "Portainer redeploy response: $RESPONSE"
          if [ "$RESPONSE" != "200" ]; then
            echo "Redeploy failed with HTTP $RESPONSE"
            exit 1
          fi
          echo "Stack redeploy triggered successfully"
