# =============================================================================
# White-Label CMS — Publish Channel Manifests
# =============================================================================
# Triggered when you push a git tag to signal a channel release:
#
#   stable-v*       -> writes public/versions/stable.json
#   lts-v*          -> writes public/versions/lts.json
#   experimental-v* -> writes public/versions/experimental.json
#
# Usage:
#   git tag stable-v1.3.0 && git push origin stable-v1.3.0
#   git tag lts-v1.2.0    && git push origin lts-v1.2.0
#
# The tag must point to a commit that already has public/cms-version.json
# bumped (the auto-version CI runs first on push to main, then you tag).
#
# Client CMS instances on a channel will see an update when the channel
# manifest version exceeds their local version.
# =============================================================================

name: Publish Channel Manifest

on:
  push:
    tags:
      - "stable-v*"
      - "lts-v*"
      - "experimental-v*"

jobs:
  publish:
    name: Write Channel Manifest
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          # Check out the commit the tag points to (not detached HEAD of tag)
          ref: main

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Determine channel from tag
        id: channel
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [[ "$TAG" == stable-v* ]]; then
            echo "name=stable" >> "$GITHUB_OUTPUT"
          elif [[ "$TAG" == lts-v* ]]; then
            echo "name=lts" >> "$GITHUB_OUTPUT"
          elif [[ "$TAG" == experimental-v* ]]; then
            echo "name=experimental" >> "$GITHUB_OUTPUT"
          else
            echo "Unknown tag pattern: $TAG" && exit 1
          fi

      - name: Write channel manifest
        run: |
          CHANNEL="${{ steps.channel.outputs.name }}"
          mkdir -p public/versions
          # Copy current cms-version.json into the channel file, adding channel field
          node -e "
            const fs = require('fs');
            const v = JSON.parse(fs.readFileSync('public/cms-version.json', 'utf8'));
            v.channel = '$CHANNEL';
            v.taggedAt = new Date().toISOString();
            fs.mkdirSync('public/versions', { recursive: true });
            fs.writeFileSync('public/versions/$CHANNEL.json', JSON.stringify(v, null, 2) + '\n');
            console.log('Written public/versions/$CHANNEL.json -> v' + v.version);
          "

      - name: Commit and push channel manifest
        run: |
          CHANNEL="${{ steps.channel.outputs.name }}"
          VERSION=$(node -e "const v=require('./public/cms-version.json');console.log(v.version)")
          git add public/versions/${CHANNEL}.json
          if git diff --staged --quiet; then
            echo "No changes to channel manifest — nothing to commit."
          else
            git commit -m "chore: publish ${CHANNEL} channel -> v${VERSION} [skip ci]"
            git push origin main
            echo "Published ${CHANNEL} channel at v${VERSION}"
          fi
