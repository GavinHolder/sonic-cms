<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>OVB Readymix · Built for the Overberg</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800;900&family=Archivo+Black&family=Bebas+Neue&family=Anton&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
/* ─── BASE (dark) ─────────────────────────────────────────────────────── */
:root {
  --ink: #0c0d0c;
  --ink-2: #15171a;
  --ink-3: #1c1f23;
  --char: #1a1a1a;
  --line: rgba(255,255,255,0.08);
  --line-2: rgba(255,255,255,0.14);
  --grey: #9e9e9e;
  --grey-d: #5a5d62;
  --paper: #f5f3ee;
  --green: #2e7d32;
  --green-d: #1b5e20;
  --green-l: #4f9c54;
  --green-glow: rgba(79,156,84,0.35);
  --hd: "Archivo","Archivo Black","Helvetica Neue",sans-serif;
  --hd-weight: 900;
  --hd-stretch: 100%;
  --hd-tracking: -0.02em;
  --body: "Inter","Helvetica Neue",system-ui,sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;background:var(--ink);color:#fff;font-family:var(--body);-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
body{overflow-x:hidden}
img{display:block;max-width:100%}
button{font-family:inherit}
a{color:inherit;text-decoration:none}

/* Type */
.hd{font-family:var(--hd);font-weight:var(--hd-weight);font-stretch:var(--hd-stretch);letter-spacing:var(--hd-tracking);line-height:0.92;text-transform:uppercase}
.eyebrow{font-family:var(--body);font-size:11px;font-weight:600;letter-spacing:0.18em;text-transform:uppercase;color:var(--green-l)}
.eyebrow.muted{color:rgba(255,255,255,0.5)}

/* Page shell */
.page{width:100%;overflow:hidden}
.wrap{width:100%;max-width:1440px;margin:0 auto;padding:0 56px}
@media(max-width:880px){.wrap{padding:0 24px}}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:14px;padding:16px 28px;border-radius:4px;border:1px solid transparent;background:#fff;color:var(--ink);font-family:var(--body);font-weight:600;font-size:13px;letter-spacing:0.06em;text-transform:uppercase;cursor:pointer;transition:transform 0.25s ease,background 0.25s ease,border-color 0.25s ease;white-space:nowrap}
.btn:hover{transform:translateY(-2px)}
.btn-green{background:var(--green);color:#fff}
.btn-green:hover{background:var(--green-l)}
.btn-ghost{background:transparent;color:#fff;border-color:rgba(255,255,255,0.25)}
.btn-ghost:hover{border-color:#fff;background:rgba(255,255,255,0.06)}
.btn .arr{width:14px;height:8px;position:relative}
.btn .arr::after{content:"";position:absolute;inset:0;background:currentColor;-webkit-mask:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='8' viewBox='0 0 14 8'><path d='M0 4h12M9 1l3 3-3 3' stroke='black' stroke-width='1.5' fill='none' stroke-linecap='square'/></svg>") center/contain no-repeat;mask:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='8' viewBox='0 0 14 8'><path d='M0 4h12M9 1l3 3-3 3' stroke='black' stroke-width='1.5' fill='none' stroke-linecap='square'/></svg>") center/contain no-repeat}
.link-arrow{display:inline-flex;align-items:center;gap:10px;color:#fff;font-weight:600;font-size:12px;letter-spacing:0.14em;text-transform:uppercase;cursor:pointer;border:0;background:transparent;padding:0}
.link-arrow .arr{width:18px;height:8px}
.link-arrow:hover{color:var(--green-l)}

/* Nav */
.nav{position:fixed;top:0;left:0;right:0;z-index:50;display:flex;align-items:center;justify-content:space-between;padding:22px 56px;transition:background 0.3s ease,backdrop-filter 0.3s ease,padding 0.3s ease}
.nav.scrolled{background:rgba(12,13,12,0.72);backdrop-filter:blur(14px) saturate(140%);-webkit-backdrop-filter:blur(14px) saturate(140%);padding:14px 56px;border-bottom:1px solid var(--line)}
.nav-logo{display:flex;align-items:center;gap:10px;font-family:var(--hd);font-weight:900;font-size:18px;letter-spacing:0.02em}
.nav-logo .mark{width:32px;height:32px;background:var(--green);display:grid;place-items:center;font-family:var(--hd);font-weight:900;font-size:13px;letter-spacing:-0.04em;color:#fff}
.nav-links{display:flex;gap:36px;font-size:12px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase}
.nav-links a{opacity:0.78;cursor:pointer;transition:opacity 0.2s}
.nav-links a:hover{opacity:1}
.nav-cta{font-size:12px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;padding:10px 18px;border:1px solid rgba(255,255,255,0.25);border-radius:4px;cursor:pointer;background:transparent;color:#fff}
.nav-cta:hover{background:var(--green);border-color:var(--green)}
.nav-right{display:flex;align-items:center;gap:8px}
.theme-toggle{width:36px;height:36px;background:transparent;border:1px solid rgba(255,255,255,0.22);border-radius:4px;cursor:pointer;display:grid;place-items:center;color:#fff;transition:background 0.2s,border-color 0.2s;padding:0}
.theme-toggle:hover{background:rgba(255,255,255,0.1);border-color:rgba(255,255,255,0.5)}
.theme-toggle svg{display:block}
@media(max-width:880px){.nav{padding:18px 24px}.nav.scrolled{padding:12px 24px}.nav-links{display:none}}

/* Hero */
.hero{position:relative;height:100vh;min-height:720px;overflow:hidden}
.hero-slide{position:absolute;inset:0;opacity:0;transition:opacity 1.2s ease}
.hero-slide.active{opacity:1}
.hero-slide .bg{position:absolute;inset:-10% -2%;background-size:cover;background-position:center;transform:translate3d(0,0,0) scale(1.05);filter:contrast(1.05) saturate(0.92);will-change:transform}
.hero-slide::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(12,13,12,0) 0%,rgba(12,13,12,0.35) 55%,rgba(12,13,12,0.95) 100%),linear-gradient(90deg,rgba(12,13,12,0.55) 0%,rgba(12,13,12,0.15) 60%);pointer-events:none}
.hero-content{position:absolute;left:0;right:0;bottom:0;padding:0 56px 100px;z-index:2;display:grid;grid-template-columns:1fr 1fr;gap:60px;align-items:end}
.hero-text{max-width:720px}
.hero-text .eyebrow{margin-bottom:28px;display:block}
.hero-text h1{font-size:clamp(56px,9vw,144px);margin:0 0 24px;color:#fff}
.hero-text h1 .accent{color:var(--green-l)}
.hero-text p{font-size:18px;line-height:1.45;max-width:480px;color:rgba(255,255,255,0.78);margin:0 0 36px}
.hero-actions{display:flex;gap:12px;flex-wrap:wrap}
.hero-meta{align-self:end;justify-self:end;text-align:right;font-size:11px;letter-spacing:0.16em;text-transform:uppercase;color:rgba(255,255,255,0.55);display:flex;flex-direction:column;gap:6px}
.hero-meta .lat{font-family:var(--hd);font-size:14px;color:rgba(255,255,255,0.85);letter-spacing:0.08em}
.hero-controls{position:absolute;left:56px;bottom:40px;display:flex;align-items:center;gap:18px;z-index:3}
.hero-dots{display:flex;gap:8px}
.hero-dot{width:38px;height:2px;background:rgba(255,255,255,0.25);cursor:pointer;border:0;padding:0;position:relative;overflow:hidden}
.hero-dot.active{background:rgba(255,255,255,0.95)}
.hero-counter{font-family:var(--hd);font-size:12px;letter-spacing:0.1em;color:rgba(255,255,255,0.7);font-variant-numeric:tabular-nums}
.hero-scroll{position:absolute;right:56px;bottom:40px;z-index:3;display:flex;align-items:center;gap:10px;font-size:10px;letter-spacing:0.18em;text-transform:uppercase;color:rgba(255,255,255,0.55)}
.hero-scroll-line{width:60px;height:1px;background:rgba(255,255,255,0.4);position:relative;overflow:hidden}
.hero-scroll-line::after{content:"";position:absolute;inset:0;background:var(--green-l);animation:scroll-pulse 2.6s ease-in-out infinite}
@keyframes scroll-pulse{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
@media(max-width:880px){.hero-content{padding:0 24px 80px;grid-template-columns:1fr;gap:30px}.hero-meta{justify-self:start;text-align:left}.hero-controls{left:24px;bottom:20px}.hero-scroll{display:none}}

/* Section base */
.section{position:relative;padding:140px 0;overflow:hidden}
.section-head{display:grid;grid-template-columns:1fr auto;align-items:end;gap:40px;margin-bottom:72px}
.section-head h2{font-size:clamp(40px,6vw,88px);margin:14px 0 0;color:#fff;max-width:720px}
.section-head .lead{max-width:380px;font-size:15px;line-height:1.55;color:rgba(255,255,255,0.7)}
@media(max-width:880px){.section{padding:90px 0}.section-head{grid-template-columns:1fr;gap:24px;margin-bottom:48px}}

/* Services */
.services{background:var(--green-d);color:#fff}
.services::before{content:"";position:absolute;inset:0;background:radial-gradient(60% 90% at 80% 0%,rgba(255,255,255,0.06),transparent 60%),repeating-linear-gradient(135deg,rgba(0,0,0,0.05) 0 2px,transparent 2px 12px);pointer-events:none}
.services .eyebrow{color:rgba(255,255,255,0.7)}
.services-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;position:relative;z-index:1}
.svc-card{background:rgba(0,0,0,0.32);border:1px solid rgba(255,255,255,0.08);padding:36px 32px 32px;display:flex;flex-direction:column;position:relative;min-height:380px;transition:transform 0.3s ease,background 0.3s ease;overflow:hidden}
.svc-card::before{content:"";position:absolute;top:0;left:0;right:0;height:3px;background:var(--green-l);transform:scaleX(0.2);transform-origin:left;transition:transform 0.4s ease}
.svc-card:hover{transform:translateY(-6px);background:rgba(0,0,0,0.45)}
.svc-card:hover::before{transform:scaleX(1)}
.svc-num{font-family:var(--hd);font-size:12px;letter-spacing:0.2em;color:rgba(255,255,255,0.5);margin-bottom:60px}
.svc-icon{width:56px;height:56px;margin-bottom:28px}
.svc-card h3{font-family:var(--hd);font-weight:900;font-size:28px;letter-spacing:-0.01em;line-height:1.05;margin:0 0 14px;text-transform:uppercase}
.svc-card p{font-size:14px;line-height:1.55;color:rgba(255,255,255,0.72);margin:0 0 auto}
.svc-card .link-arrow{margin-top:28px;font-size:11px;color:rgba(255,255,255,0.85)}
.services-foot{margin-top:56px;display:flex;justify-content:space-between;align-items:center;position:relative;z-index:1}
.services-foot .note{font-size:12px;letter-spacing:0.14em;text-transform:uppercase;color:rgba(255,255,255,0.55)}
@media(max-width:880px){.services-grid{grid-template-columns:1fr}.services-foot{flex-direction:column;gap:24px;align-items:flex-start}}

/* About */
.about{background:var(--ink)}
.about-grid{display:grid;grid-template-columns:1.05fr 1fr;gap:80px;align-items:stretch}
.about-photo{position:relative;min-height:620px;background-size:cover;background-position:center;overflow:hidden}
.about-photo.placeholder,.proj-card.placeholder .proj-img,.strip-cell.placeholder{background:repeating-linear-gradient(45deg,rgba(255,255,255,0.04) 0 1px,transparent 1px 12px),linear-gradient(180deg,#1c1f23 0%,#0f1114 100%) !important}
.placeholder-label{position:absolute;inset:0;display:grid;place-items:center;font-family:ui-monospace,"SF Mono",Menlo,monospace;font-size:10px;letter-spacing:0.18em;text-transform:uppercase;color:rgba(255,255,255,0.45);text-align:center;padding:16px;line-height:1.7;z-index:1}
.placeholder-label b{display:block;font-family:var(--hd);font-weight:900;font-size:13px;letter-spacing:0.06em;color:rgba(255,255,255,0.7);margin-bottom:8px}
.about-photo::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,transparent 0%,rgba(12,13,12,0.5) 100%)}
.about-photo .badge{position:absolute;bottom:24px;left:24px;background:var(--green);padding:12px 18px;font-size:11px;font-weight:600;letter-spacing:0.16em;text-transform:uppercase;z-index:1}
.about-text{padding:20px 0;display:flex;flex-direction:column}
.about-text h2{font-size:clamp(40px,5.4vw,76px);margin:18px 0 28px}
.about-text .copy{font-size:16px;line-height:1.6;color:rgba(255,255,255,0.78);max-width:480px;margin-bottom:48px}
.stats-compare{border-top:1px solid var(--line);padding-top:40px;display:grid;gap:56px}
.stats-treatment{display:flex;flex-direction:column;gap:16px}
.stats-treatment .t-label{font-size:10px;font-weight:600;letter-spacing:0.22em;text-transform:uppercase;color:rgba(255,255,255,0.4);display:flex;align-items:center;gap:14px}
.stats-treatment .t-label::before{content:"";width:18px;height:1px;background:var(--green-l)}
.stats-a{display:grid;grid-template-columns:repeat(3,1fr);gap:24px}
.stats-a .stat{display:flex;flex-direction:column;gap:8px}
.stats-a .num{font-family:var(--hd);font-weight:900;font-size:clamp(48px,5.5vw,72px);line-height:1;color:var(--green-l);letter-spacing:-0.03em}
.stats-a .lbl{font-size:11px;letter-spacing:0.16em;text-transform:uppercase;color:rgba(255,255,255,0.7);line-height:1.4}
.stats-b{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;border-top:1px dashed var(--line);padding-top:32px}
.stats-b .stat{display:flex;flex-direction:column;gap:6px}
.stats-b .num{font-family:var(--hd);font-weight:900;font-size:clamp(42px,4.8vw,60px);color:#fff;font-variant-numeric:tabular-nums;letter-spacing:-0.02em;line-height:1}
.stats-b .num small{font-size:0.4em;color:var(--green-l);margin-left:6px;letter-spacing:0.04em}
.stats-b .lbl{font-size:12px;color:rgba(255,255,255,0.55);letter-spacing:0.04em}
.stats-c{display:grid;grid-template-columns:repeat(3,1fr);border:1px solid var(--line-2);border-radius:2px;background:rgba(255,255,255,0.02)}
.stats-c .stat{padding:22px 20px;display:flex;flex-direction:column;gap:4px;border-right:1px solid var(--line)}
.stats-c .stat:last-child{border-right:0}
.stats-c .num{font-family:var(--hd);font-weight:900;font-size:38px;color:#fff;letter-spacing:-0.02em;line-height:1}
.stats-c .num em{color:var(--green-l);font-style:normal}
.stats-c .lbl{font-size:10px;letter-spacing:0.18em;text-transform:uppercase;color:rgba(255,255,255,0.5)}
@media(max-width:980px){.about-grid{grid-template-columns:1fr;gap:40px}.about-photo{min-height:360px}.stats-a,.stats-b,.stats-c{grid-template-columns:1fr 1fr}}

/* Projects */
.projects{background:var(--char);position:relative}
.projects-mosaic{display:grid;grid-template-columns:repeat(12,1fr);grid-auto-rows:180px;gap:14px}
.proj-card{position:relative;overflow:hidden;background:#1c1f23;cursor:pointer;transition:transform 0.4s ease}
.proj-card:hover{transform:translateY(-4px)}
.proj-card:hover .proj-img{transform:scale(1.06)}
.proj-img{position:absolute;inset:0;background-size:cover;background-position:center;transition:transform 0.7s ease;filter:brightness(0.78) saturate(0.95)}
.proj-card::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,transparent 30%,rgba(0,0,0,0.85) 100%);pointer-events:none}
.proj-meta{position:absolute;left:18px;right:18px;bottom:18px;z-index:2;color:#fff}
.proj-loc{display:inline-flex;align-items:center;gap:6px;font-size:10px;font-weight:600;letter-spacing:0.18em;text-transform:uppercase;color:var(--green-l);margin-bottom:8px}
.proj-loc::before{content:"";width:6px;height:6px;background:var(--green-l);border-radius:50%}
.proj-name{font-family:var(--hd);font-weight:900;font-size:22px;letter-spacing:-0.01em;line-height:1.05;margin:0 0 4px;text-transform:uppercase}
.proj-detail{font-size:12px;color:rgba(255,255,255,0.65)}
.proj-card.s-lg{grid-column:span 6;grid-row:span 2}
.proj-card.s-md{grid-column:span 4;grid-row:span 2}
.proj-card.s-sm{grid-column:span 4;grid-row:span 1}
.proj-card.s-tall{grid-column:span 4;grid-row:span 2}
.proj-card.s-wide{grid-column:span 8;grid-row:span 1}
.proj-card.s-mid{grid-column:span 6;grid-row:span 1}
.projects-strip{margin-top:14px;display:grid;grid-template-columns:repeat(4,1fr);gap:4px;height:180px}
.strip-cell{background-size:cover;background-position:center;filter:brightness(0.85) saturate(0.9);transition:filter 0.3s ease}
.strip-cell:hover{filter:brightness(1) saturate(1)}
.projects-foot{margin-top:56px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:24px}
.projects-foot .count{font-family:var(--hd);font-size:14px;letter-spacing:0.1em;color:rgba(255,255,255,0.55)}
.projects-foot .count em{font-style:normal;color:var(--green-l)}
@media(max-width:980px){.projects-mosaic{grid-template-columns:repeat(6,1fr);grid-auto-rows:140px}.proj-card.s-lg,.proj-card.s-md,.proj-card.s-sm,.proj-card.s-tall,.proj-card.s-wide,.proj-card.s-mid{grid-column:span 6;grid-row:span 1;min-height:220px}.projects-strip{grid-template-columns:repeat(2,1fr);height:auto}.strip-cell{aspect-ratio:4/3}}

/* Gallery */
.gallery{background:var(--ink-2)}
.gallery-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.gallery-cell{position:relative;overflow:hidden;background:#1c1f23;aspect-ratio:4/3;cursor:pointer}
.gallery-img{position:absolute;inset:0;background-size:cover;background-position:center;transition:transform 0.7s ease;filter:brightness(0.85) saturate(0.9)}
.gallery-cell:hover .gallery-img{transform:scale(1.06);filter:brightness(0.98) saturate(1.05)}
.gallery-foot{margin-top:48px;display:flex;justify-content:flex-end}
@media(max-width:880px){.gallery-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:560px){.gallery-grid{grid-template-columns:1fr}}

/* Why */
.why{background:linear-gradient(180deg,var(--ink) 0%,#0f2914 60%,var(--green-d) 100%);position:relative}
.why::before{content:"";position:absolute;inset:0;background:radial-gradient(40% 60% at 90% 50%,rgba(79,156,84,0.18),transparent 60%);pointer-events:none}
.why-silhouette{position:absolute;right:-8%;top:50%;width:720px;height:360px;transform:translateY(-50%);opacity:0.18;pointer-events:none;background-image:url("https://images.unsplash.com/photo-1581094288338-2314dddb7ece?w=1400&q=70");background-size:contain;background-position:center;background-repeat:no-repeat;filter:grayscale(1) brightness(2) contrast(2.5);mix-blend-mode:overlay;will-change:transform}
.why-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;position:relative;z-index:1}
.why-card{position:relative;padding:36px 32px;border-radius:4px;min-height:280px;display:flex;flex-direction:column;transition:transform 0.4s ease}
.why-card:hover{transform:translateY(-4px)}
.why-card .num{font-family:var(--hd);font-size:12px;letter-spacing:0.2em;color:var(--green-l);margin-bottom:56px}
.why-card h3{font-family:var(--hd);font-weight:900;font-size:26px;text-transform:uppercase;letter-spacing:-0.01em;line-height:1.05;margin:0 0 14px}
.why-card p{font-size:14px;line-height:1.55;color:rgba(255,255,255,0.78);margin:0}
[data-cards="frosted"] .why-card,[data-cards="frosted"] .svc-card{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px)}
[data-cards="glow"] .why-card{background:linear-gradient(180deg,rgba(255,255,255,0.04),rgba(255,255,255,0.01));border:1px solid rgba(255,255,255,0.1);box-shadow:0 0 0 1px rgba(79,156,84,0),0 24px 60px -20px rgba(79,156,84,0.18);transition:transform 0.4s ease,box-shadow 0.4s ease}
[data-cards="glow"] .why-card:hover{box-shadow:0 0 0 1px rgba(79,156,84,0.4),0 30px 80px -20px rgba(79,156,84,0.45)}
[data-cards="glow"] .svc-card{background:rgba(0,0,0,0.32);box-shadow:0 24px 60px -30px rgba(79,156,84,0.5)}
[data-cards="solid"] .why-card{background:var(--ink-3);border:1px solid var(--line)}
[data-cards="solid"] .svc-card{background:rgba(0,0,0,0.45);border:1px solid rgba(255,255,255,0.1)}
@media(max-width:980px){.why-grid{grid-template-columns:1fr}.why-silhouette{width:480px;opacity:0.1}}

/* How */
.how{background:linear-gradient(180deg,var(--green-d) 0%,#0f2914 50%,var(--ink) 100%);position:relative}
.how-grid{display:grid;grid-template-columns:1fr 0.9fr;gap:80px;align-items:center}
.steps{display:flex;flex-direction:column}
.step{display:grid;grid-template-columns:120px 1fr;gap:28px;align-items:baseline;padding:28px 0;border-top:1px solid var(--line-2)}
.step:last-child{border-bottom:1px solid var(--line-2)}
.step .n{font-family:var(--hd);font-weight:900;font-size:64px;line-height:0.9;color:var(--green-l);letter-spacing:-0.04em;font-variant-numeric:tabular-nums}
.step .body{padding-top:8px}
.step h4{font-family:var(--hd);font-weight:900;font-size:22px;text-transform:uppercase;letter-spacing:-0.01em;margin:0 0 6px}
.step .sub{font-size:13px;color:rgba(255,255,255,0.6)}

/* Contact */
.contact{background:var(--ink);position:relative}
.contact-grid{display:grid;grid-template-columns:1fr 0.85fr;gap:80px}
.contact h2{font-size:clamp(48px,7vw,104px);margin:18px 0 28px;line-height:0.92}

.form-field:focus-within{border-color:var(--green-l)}

.reveal{opacity:0;transform:translateY(30px);transition:opacity 0.9s ease,transform 0.9s cubic-bezier(.2,.7,.2,1)}
.reveal.in{opacity:1;transform:translateY(0)}

      entries.forEach((e) => { if (e.isIntersecting) e.target.classList.add("in"); });
    }, { threshold: 0.12, rootMargin: "0px 0px -40px 0px" });
    els.forEach((el) => io.observe(el));
    return () => io.disconnect();
  }, []);
}

function useScrollY() {
  const [y, setY] = useState(0);
  useEffect(() => {
    const onScroll = () => setY(window.scrollY);
    window.addEventListener("scroll", onScroll, { passive: true });
    return () => window.removeEventListener("scroll", onScroll);
  }, []);
  return y;
}

/* ── About ───────────────────────────────────────────────────────────── */
function Counter() {
  const [n1, set1] = useState(0);
  const [n2, set2] = useState(0);
  const ref = useRef(null);
  useEffect(() => {
    const io = new IntersectionObserver(([e]) => {
      if (e.isIntersecting) {
        const dur = 1600, start = performance.now();
        const tick = (t) => {
          const p = Math.min(1, (t - start) / dur);
          const eased = 1 - Math.pow(1 - p, 3);
          set1(Math.round(25 * eased));
          set2(Math.round(10000 * eased));
          if (p < 1) requestAnimationFrame(tick);
        };
        requestAnimationFrame(tick);
        io.disconnect();
      }
    }, { threshold: 0.4 });
    if (ref.current) io.observe(ref.current);
    return () => io.disconnect();
  }, []);
  return (
    <div className="stats-b" ref={ref}>
      <div className="stat"><div className="num">{n1}<small>YRS</small></div><div className="lbl">In the Overberg</div></div>
      <div className="stat"><div className="num">{n2.toLocaleString()}<small>M³</small></div><div className="lbl">Delivered to date</div></div>
      <div className="stat"><div className="num">3<small>GEN</small></div><div className="lbl">Family-owned</div></div>
    </div>
  );
}

      </div>
    </footer>
  );
}

/* ── App ─────────────────────────────────────────────────────────────── */
function App() {
  const [slideIdx, setSlideIdx] = useState(0);
  const [theme, setTheme] = useState(() => {
    try { return localStorage.getItem("ovb-theme") || "dark"; } catch { return "dark"; }
  });
  useReveal();

  useEffect(() => {
    document.documentElement.setAttribute("data-theme", theme);
    try { localStorage.setItem("ovb-theme", theme); } catch {}
  }, [theme]);

  const onToggleTheme = useCallback(() => {
    setTheme((t) => (t === "dark" ? "light" : "dark"));
  }, []);

  const onCta = () => {
    const el = document.getElementById("contact");
    if (el) window.scrollTo({ top: el.getBoundingClientRect().top + window.scrollY, behavior: "smooth" });
  };

  return (
    <div className="page" data-cards="frosted">
      <Nav onCta={onCta} theme={theme} onToggleTheme={onToggleTheme} />
      <Hero slideIdx={slideIdx} setSlideIdx={setSlideIdx} />
      <Services />
      <About />
      <Projects />
      <Gallery />
      <Why />
      <How />
      <Contact />
      <Footer />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
